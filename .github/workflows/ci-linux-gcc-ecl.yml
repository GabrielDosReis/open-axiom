# Linux: GCC 15 + ECL (standard-linking / Lisp-to-C path)
name: 'CI: Linux GCC+ECL'
on:
  push:
    branches: [master, cmake-migration-proposal]
  pull_request:
    branches: [master]
jobs:
  build:
    uses: ./.github/workflows/ci-linux-build.yml
    with:
      cc: gcc-15
      cxx: g++-15
      lisp: ecl
