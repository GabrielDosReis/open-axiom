# Linux: GCC 15 + Clozure CL (standard FASL path)
name: 'CI: Linux GCC+CCL'
on:
  push:
    branches: [master, cmake-migration-proposal]
  pull_request:
    branches: [master]
jobs:
  build:
    uses: ./.github/workflows/ci-linux-build.yml
    with:
      cc: gcc-15
      cxx: g++-15
      lisp: clozure
      lisp_executable: ccl
