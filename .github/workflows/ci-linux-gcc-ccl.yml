# Linux: GCC 15 + Clozure CL (standard FASL path)
name: 'CI: Linux GCC+CCL'
on:
  schedule:
    - cron: '0 3 * * *'  # nightly at 03:00 UTC
  workflow_dispatch:
jobs:
  build:
    uses: ./.github/workflows/ci-linux-build.yml
    with:
      cc: gcc-15
      cxx: g++-15
      lisp: clozure
      lisp_executable: ccl
      build_algstrap: true
