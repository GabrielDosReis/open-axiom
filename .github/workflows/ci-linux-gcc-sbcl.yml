# Linux: GCC 15 + SBCL (primary configuration)
name: 'CI: Linux GCC+SBCL'
on:
  push:
    branches: [master, cmake-migration-proposal]
  pull_request:
    branches: [master]
jobs:
  build:
    uses: ./.github/workflows/ci-linux-build.yml
    with:
      cc: gcc-15
      cxx: g++-15
      lisp: sbcl
      run_install_test: true
      build_algstrap: true
